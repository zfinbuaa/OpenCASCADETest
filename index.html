<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://unpkg.com blob: file:;">
<title>整车数模自动拆装方案系统</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Microsoft YaHei', sans-serif; overflow: hidden; height: 100vh; }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* Tabs */
  #tab-bar {
    display: flex; background: #0f3460; height: 34px; flex-shrink: 0;
    padding: 0 8px; align-items: flex-end;
  }
  .tab {
    padding: 6px 18px; margin-right: 2px; border-radius: 6px 6px 0 0;
    cursor: pointer; font-size: 13px; color: #8899aa; border: none;
    background: #0a1f3a; transition: all 0.15s;
  }
  .tab.active { background: #16213e; color: #7ec8e3; font-weight: 600; }
  .tab:hover:not(.active) { background: #12253d; color: #aac; }

  #main-area { display: flex; flex: 1; overflow: hidden; }
  #viewport { flex: 1; position: relative; background: #ffffff; }
  #viewport canvas { display: block; }

  #panel {
    width: 340px; min-width: 340px; flex-shrink: 0;
    background: #16213e; color: #e0e0e0;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #panel-header {
    padding: 10px 16px; background: #0f3460; font-size: 15px; font-weight: 600;
    border-bottom: 1px solid #1a1a4e;
  }
  #panel-body { flex: 1; overflow-y: auto; padding: 4px 0; }
  #panel-footer { padding: 6px 12px; background: #0f3460; font-size: 10px; color: #778; }

  .section-title {
    padding: 8px 16px 3px; font-size: 11px; text-transform: uppercase;
    color: #7ec8e3; letter-spacing: 1px; font-weight: 600;
  }
  .btn {
    display: inline-block; padding: 5px 12px; margin: 2px 3px; border: none;
    border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit;
    transition: all 0.15s;
  }
  .btn-pri { background: #1e90ff; color: #fff; }
  .btn-pri:hover { background: #3aa0ff; }
  .btn-outline { background: transparent; border: 1px solid #555; color: #ccc; }
  .btn-outline:hover { border-color: #1e90ff; color: #1e90ff; }
  .btn-group { padding: 3px 12px; display: flex; flex-wrap: wrap; gap: 3px; }

  /* Tree */
  .tree-item {
    display: flex; align-items: center; padding: 2px 10px; cursor: pointer;
    font-size: 11px; transition: background 0.1s;
  }
  .tree-item:hover { background: rgba(255,255,255,0.05); }
  .tree-item.selected { background: rgba(30,144,255,0.25); }
  .tree-item .icon { width: 14px; margin-right: 3px; flex-shrink: 0; }
  .tree-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tree-item .badge {
    font-size: 8px; padding: 1px 4px; border-radius: 3px; margin-left: 3px;
    background: #333; color: #aaa; flex-shrink: 0;
  }
  .tree-item .badge.stage { background: #1e90ff; color: #fff; }

  #status-bar {
    position: absolute; bottom: 6px; left: 6px; right: 6px;
    padding: 4px 8px; background: rgba(0,0,0,0.5); color: #aaa;
    font-size: 10px; border-radius: 3px; pointer-events: none;
  }

  #pipeline-log {
    margin: 4px 10px; padding: 6px; background: #0a0a1a; border-radius: 3px;
    font-family: Consolas, monospace; font-size: 9px; color: #7ec8e3;
    max-height: 120px; overflow-y: auto; display: none;
  }
  #pipeline-log.visible { display: block; }

  .slider-row { padding: 3px 14px; font-size: 11px; display: flex; align-items: center; gap: 6px; }
  .slider-row input[type=range] { flex: 1; accent-color: #1e90ff; }

  select.sel { margin: 4px 12px; padding: 4px 8px; border-radius: 3px; border: 1px solid #444;
    background: #0d1b33; color: #ccc; font-size: 12px; width: calc(100% - 24px); }
</style>
</head>
<body>

<div id="app">
  <div id="tab-bar">
    <button class="tab active" data-tab="0">位置图</button>
    <button class="tab" data-tab="1">爆炸图</button>
    <button class="tab" data-tab="2">拆装方案</button>
  </div>

  <div id="main-area">
    <div id="viewport">
      <div id="status-bar">就绪 — Ctrl+O 加载数据 | Ctrl+I 导入 STP 预览</div>
    </div>

    <div id="panel">
      <div id="panel-header">位置图</div>
      <div id="panel-body"></div>
      <div id="pipeline-log"></div>
      <div id="panel-footer">OCCT + Three.js + Electron | v2.0</div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
  }
}
</script>

<script type="module" src="js/main.js"></script>
</body>
</html>
